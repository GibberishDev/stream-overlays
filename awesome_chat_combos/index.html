<!-- #region imports -->
<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="#">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<!-- #region scripts -->
<script src="./scripts/tmi.js"></script>
<script src="./scripts/emotes.js"></script>
<script src="./scripts/ready.js"></script>
<script src="./scripts/settings.js"></script>
<script defer src="./scripts/index.js"></script>
<!-- #endregion -->
 <link rel="stylesheet" href="styles/index.css">
 <link rel="stylesheet" href="styles/settings.css">
</head>
<!-- #endregion -->
 <!-- #region html defenitions-->
<body>
    <input id="open-settings" type="button" value="Open settings" onclick="genSettingsMenu()">
    <div id="settings-wrapper" class="hidden">
        <div id="settings-title">Settings</div>
        <div id="settings-container"></div>
        <div id="settings-controls">
            <input type="button" value="Save" onclick="inputSaveSettings()">
            <input type="button" value="Cancel" onclick="inputCancelSettigns()">
            <input type="button" value="Reset" onclick="inputResetSettings()">
        </div>
    </div>
    <div id="combo-wrapper" class="combo-wrapper pos-bottom-left"></div>
    <div id="content-preview" class="combo-wrapper pos-bottom-left" style="display: none;">
        <div id="preview-entry-super" class="entry-wrapper super">
            <div class="entry-bg">
                <div class="fire-stem"></div>
                <div class="fire"></div>
            </div>
            <div class="entry">
                <div class="timer"></div>
                <div class="word">
                    <div class="letter">S</div>
                    <div class="letter">U</div>
                    <div class="letter">P</div>
                    <div class="letter">E</div>
                    <div class="letter">R</div>
                    <div class="letter">C</div>
                    <div class="letter">O</div>
                    <div class="letter">M</div>
                    <div class="letter">B</div>
                    <div class="letter">O</div>
                </div>
                <div id="preview-counter-super" class="counter">
                    <div class="letter">X</div>
                    <div class="letter">2</div>
                    <div class="letter">5</div>
                </div>
            </div>
        </div>
        <div id="preview-entry-mega" class="entry-wrapper mega">
            <div class="entry-bg">
                <div class="fire-stem"></div>
                <div class="fire"></div>
            </div>
            <div class="entry">
                <div class="timer"></div>
                <div class="word">
                    <div class="letter" style="animation-delay: 0.0s">M</div>
                    <div class="letter" style="animation-delay: 0.1s">E</div>
                    <div class="letter" style="animation-delay: 0.2s">G</div>
                    <div class="letter" style="animation-delay: 0.3s">A</div>
                    <div class="letter" style="animation-delay: 0.4s">C</div>
                    <div class="letter" style="animation-delay: 0.5s">O</div>
                    <div class="letter" style="animation-delay: 0.6s">M</div>
                    <div class="letter" style="animation-delay: 0.7s">B</div>
                    <div class="letter" style="animation-delay: 0.8s">O</div>
                </div>
                <div id="preview-counter-mega" class="counter">
                    <div class="letter" style="animation-delay: 0.0s">X</div>
                    <div class="letter" style="animation-delay: 0.1s">1</div>
                    <div class="letter" style="animation-delay: 0.2s">0</div>
                </div>
            </div>
        </div>
        <div id="preview-entry-regular" class="entry-wrapper">
            <div class="entry-bg">
                <div class="fire-stem"></div>
                <div class="fire"></div>
            </div>
            <div class="entry">
                <div class="timer"></div>
                <div class="word">
                    <div class="letter">C</div>
                    <div class="letter">O</div>
                    <div class="letter">M</div>
                    <div class="letter">B</div>
                    <div class="letter">O</div>
                </div>
                <div id="preview-counter-regular" class="counter">
                    <div class="letter">X</div>
                    <div class="letter">2</div>
                </div>
            </div>
        </div>
    </div>
    <div id="notification">
    </div>
</body>
<!-- #endregion -->
</html>
